<style>

    margin: 0 auto;
    padding: 24px;

  .hero-card,

  .form-card,
  .results-card {

  }

  .hero-card {
    padding: 24px;
    margin-bottom: 20px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .brand-logo {
    height: 44px;
    width: auto;
    display: block;
  }

  .brand-title {
    font-size: 28px;
    font-weight: 700;
    margin: 0;
    color: var(--hw-primary-dark);
  }

  .brand-subtitle {
    margin: 8px 0 0;
    color: var(--hw-muted);
    line-height: 1.6;
  }

  .calc-card,
  .form-card,
  .results-card {
    padding: 24px;
    margin-bottom: 20px;
  }

    font-weight: 700;
    margin: 0 0 16px;

    font-weight: 600;
    margin-bottom: 8px;
    color: var(--hw-text);
  }

    padding: 12px 14px;

  }

  select:focus {

    box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.14);
